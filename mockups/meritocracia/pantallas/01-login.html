<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>Mockup 01 — Login | Meritocracia PJ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body class="login-mockup-body" data-review-flow="admin">
<div class="login-mockup-frame">

    <aside class="login-brand-panel">
      <div class="login-brand-content">

        <img
          class="login-pj-logo"
          src="../assets/logo/logo-pj-blanco.svg"
          width="96"
          height="96"
          alt="Logo Poder Judicial del Perú"
        />

        <h1 class="login-brand-title">PODER JUDICIAL<br />DEL PERÚ</h1>

        <img
          class="login-brand-divider"
          src="../assets/icons/divider-diamond.svg"
          width="200"
          height="12"
          alt=""
          aria-hidden="true"
        />

        <img
          class="login-courthouse-icon"
          src="../assets/icons/courthouse-white.svg"
          width="72"
          height="72"
          alt=""
          aria-hidden="true"
        />

        <h2 class="login-platform-title">Plataforma de Valoración de Méritos</h2>
        <p class="login-platform-desc">
          Valoración de méritos para la selección de Jueces Superiores Titulares y Supremos
        </p>
      </div>
    </aside>

    <main class="login-form-panel">
      <div class="login-card">

        <div class="login-card-icon">
          <img src="../assets/icons/shield-scales.svg" width="36" height="36" alt="" aria-hidden="true" />
        </div>

        <h2 class="login-card-title">Iniciar sesión</h2>
        <p class="login-card-subtitle">Ingrese sus credenciales para continuar</p>

        <form action="#" method="get" novalidate id="login-form">
          <div class="login-field">
            <label for="usuario">Usuario</label>
            <div class="login-input-wrap">
              <img class="field-icon" src="../assets/icons/user.svg" width="20" height="20" alt="" aria-hidden="true" />
              <input class="login-input" id="usuario" type="text" name="usuario" placeholder="Ingrese su usuario" autocomplete="username" />
            </div>
          </div>

          <div class="login-field">
            <label for="clave">Contraseña</label>
            <div class="login-input-wrap">
              <img class="field-icon" src="../assets/icons/lock.svg" width="20" height="20" alt="" aria-hidden="true" />
              <input class="login-input" id="clave" type="password" name="clave" placeholder="Ingrese su contraseña" autocomplete="current-password" />
              <button type="button" class="toggle-password" aria-label="Mostrar contraseña" id="togglePassBtn">
                <img id="eyeIcon" src="../assets/icons/eye.svg" width="20" height="20" alt="" aria-hidden="true" />
              </button>
            </div>
          </div>

          <button type="submit" class="login-btn login-btn-primary">
            <span class="btn-label">Iniciar</span>
            <img class="btn-arrow" src="../assets/icons/arrow-right.svg" width="20" height="20" alt="" aria-hidden="true" />
          </button>

          <button type="reset" class="login-btn login-btn-secondary">
            <img class="btn-icon-left" src="../assets/icons/broom.svg" width="18" height="18" alt="" aria-hidden="true" />
            <span class="btn-label">Limpiar</span>
          </button>
        </form>
      </div>

      <footer class="login-page-footer">
        <img src="../assets/icons/globe.svg" width="16" height="16" alt="" aria-hidden="true" />
        <a href="https://www.pj.gob.pe" target="_blank" rel="noopener">www.pj.gob.pe</a>
        <span class="footer-institution">Poder Judicial del Perú</span>
      </footer>
    </main>
  </div>

  <script>
    (function () {
      var LOGIN_REDIRECT = {
        admin: '02-dashboard.html',
        registrador: '02-dashboard-registrador.html',
        reportes: '06-reportes.html',
        ficha: '05-consulta-meritos.html'
      };

      var form = document.getElementById('login-form');
      if (form) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          var flow = new URLSearchParams(location.search).get('flow') || 'admin';
          var target = LOGIN_REDIRECT[flow] || LOGIN_REDIRECT.admin;
          location.href = target + '?flow=' + encodeURIComponent(flow);
        });
      }

      var input = document.getElementById('clave');
      var btn = document.getElementById('togglePassBtn');
      var icon = document.getElementById('eyeIcon');
      if (btn && input && icon) {
        btn.addEventListener('click', function () {
          var show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          icon.src = show ? '../assets/icons/eye-off.svg' : '../assets/icons/eye.svg';
          btn.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
        });
      }
    })();
  </script>
  <script src="../js/mockup-review.js" defer></script>
</body>
</html>
