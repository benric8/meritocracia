<section class="usuarios">
  <header class="usuarios__toolbar">
    <div class="usuarios__encabezado">
      <h1 class="usuarios__titulo">Gestión de Usuarios</h1>
      <p class="usuarios__subtitulo">Registro, habilitación y restablecimiento de contraseñas</p>
    </div>

    <button matButton="filled" type="button" class="usuarios__crear" (click)="abrirFormulario()">
      <mat-icon>add</mat-icon>
      Crear usuario
    </button>
  </header>

  @if (mensajeExito(); as mensaje) {
    <p class="usuarios__exito" role="status">{{ mensaje }}</p>
  }

  <app-lista-usuarios
    (restablecerClave)="onRestablecerClave($event)"
    (cambiarEstado)="onCambiarEstado($event)"
  />
</section>
