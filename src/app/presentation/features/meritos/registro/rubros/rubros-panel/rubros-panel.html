<section class="rubros-panel" aria-label="Rubros de valoración">
  <header class="rubros-panel__header">
    <span class="rubros-panel__titulo">Rubros de valoración</span>
    <span class="rubros-panel__puntaje-label">Puntaje</span>
  </header>

  <mat-accordion class="rubros-panel__accordion" multi>
    <mat-expansion-panel class="rubros-panel__item" [expanded]="false">
      <mat-expansion-panel-header class="rubros-panel__item-header">
        <mat-panel-title class="rubros-panel__item-title">
          <span class="rubros-panel__letter">A</span>
          Producción jurisdiccional
        </mat-panel-title>
        <mat-panel-description class="rubros-panel__item-score">
          {{ formatearPuntaje(puntajeProduccion) }}
        </mat-panel-description>
      </mat-expansion-panel-header>
      <app-rubro-produccion />
    </mat-expansion-panel>

    <mat-expansion-panel
      class="rubros-panel__item"
      [expanded]="true"
      (opened)="onRubroBAbierto()"
    >
      <mat-expansion-panel-header class="rubros-panel__item-header">
        <mat-panel-title class="rubros-panel__item-title">
          <span class="rubros-panel__letter">B</span>
          Antigüedad en el cargo
        </mat-panel-title>
        <mat-panel-description class="rubros-panel__item-score">
          {{ formatearPuntaje(puntajeAntiguedad()) }}
        </mat-panel-description>
      </mat-expansion-panel-header>
      @if (cargandoRubroB()) {
        <div class="rubros-panel__loading" role="status">
          <mat-progress-spinner diameter="22" mode="indeterminate" />
          <span>Cargando antigüedad registrada…</span>
        </div>
      }
      <app-rubro-antiguedad
        [fichaId]="fichaId()"
        [nivelId]="nivelId()"
        [soloLectura]="soloLectura()"
        [rubroInicial]="rubroAntiguedadLocal()"
        [fechaValoracion]="fechaValoracion()"
        [cargandoDetalle]="cargandoRubroB()"
        (puntajeChange)="onPuntajeAntiguedad($event)"
        (fichaActualizada)="onFichaActualizada($event)"
      />
    </mat-expansion-panel>
  </mat-accordion>
</section>
